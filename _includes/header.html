<header class="site-header workshop-header" data-workshop-header>
  <div class="wrapper header-inner">
    <a class="workshop-brand" href="{{ '/' | relative_url }}" aria-label="SLM-Agents workshop homepage">
      <span class="workshop-brand__name">SLM-Agents</span>
      <span class="workshop-brand__year">NeurIPS 2026</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="workshop-navigation">
      <span class="nav-toggle__label">Menu</span>
      <span class="nav-toggle__icon" aria-hidden="true"><span></span><span></span><span></span></span>
    </button>

    <nav id="workshop-navigation" class="workshop-nav" aria-label="Workshop navigation">
      <ul class="nav-primary">
        {% for link in site.data.navigation.primary %}
          <li><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
        {% endfor %}
      </ul>

      <details class="nav-more">
        <summary>More <span aria-hidden="true">▾</span></summary>
        <ul>
          {% for link in site.data.navigation.secondary %}
            <li><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
      </details>
    </nav>
  </div>
</header>
